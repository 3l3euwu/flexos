# FlexOS - GitHub Actions Build
# XFCE + Glassmorphism Edition

name: FlexOS Build

on:
  push:
    branches: [ "main", "master" ]
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    container:
      image: archlinux:latest
      options: --privileged

    steps:
    - uses: actions/checkout@v4

    - name: Dépendances
      run: |
        pacman -Syu --noconfirm
        pacman -S --noconfirm archiso squashfs-tools grub syslinux xorriso libisoburn mtools

    - name: Build FlexOS ISO
      run: |
        ls -la $GITHUB_WORKSPACE
        mkdir -p /tmp/build
        cp -r $GITHUB_WORKSPACE/. /tmp/build/
        cd /tmp/build
        chmod +x build-iso.sh
        ./build-iso.sh

    - name: Show build.log
      if: always()
      run: |
        if [ -f /tmp/build/build.log ]; then
          echo "::group::Full build.log"
          cat /tmp/build/build.log
          echo "::endgroup::"
          echo "::group::Last 50 lines"
          tail -50 /tmp/build/build.log
          echo "::endgroup::"
        else
          echo "::warning::build.log not found"
        fi

    - name: Upload ISO
      if: success()
      uses: actions/upload-artifact@v4
      with:
        name: flexos-iso
        path: /tmp/build/out/flexos-*.iso
        compression-level: 0
        if-no-files-found: error

    - name: Upload build.log (failure)
      if: failure()
      uses: actions/upload-artifact@v4
      with:
        name: build-log
        path: /tmp/build/build.log

  release:
    needs: build
    if: github.ref == 'refs/heads/main' || github.ref == 'refs/heads/master'
    runs-on: ubuntu-latest
    steps:
    - uses: actions/download-artifact@v4
      with:
        name: flexos-iso
        path: ./iso
    - uses: softprops/action-gh-release@v1
      with:
        tag_name: "flexos-$(date +'%Y%m%d')"
        name: "FlexOS $(date +'%Y-%m-%d')"
        files: ./iso/*.iso
        draft: false
        prerelease: false
