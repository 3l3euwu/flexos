-- FlexOS Conky - Glassmorphism system monitor (XFCE)

conky.config = {
    own_window = true,
    own_window_type = 'desktop',
    own_window_hints = 'undecorated,below,skip_taskbar,skip_pager',
    own_window_transparent = false,
    own_window_argb_vis = true,
    own_window_argb_value = 70,
    own_window_colour = '#1a0a2e',

    background = true,
    update_interval = 2.0,

    use_xft = true,
    font = 'Cantarell:size=11',
    xftalpha = 0.85,

    double_buffer = true,

    alignment = 'top_right',
    gap_x = 24,
    gap_y = 90,
    minimum_width = 290,
    maximum_width = 290,

    default_color = 'ffffff',
    draw_shades = false,
    draw_outline = false,
    draw_borders = false,
    draw_graph_borders = true,

    stippled_borders = 0,
    border_width = 1,
    border_inner_margin = 18,
    border_outer_margin = 14,

    override_utf8_locale = true,
    use_spacer = 'right',
};

conky.text = [[
${font Cantarell Bold:size=18}${color #ffffff}${alignc}FlexOS${font}
${color #888888}${alignc}${hr 2}

${font Cantarell:size=10}${color #bb99ff}SYSTEME${color #666666}
${goto 20}Host:    ${color #ffffff}${nodename}${color #666666}
${goto 20}Kernel:  ${color #ffffff}${kernel}${color #666666}
${goto 20}Uptime:  ${color #ffffff}${uptime}

${font Cantarell:size=10}${color #bb99ff}CPU ${alignr}${color #ffffff}${cpu}% ${color #666666}@ ${color #ffffff}${freq_g}GHz
${cpubar 6,270}
${top name 1} ${alignr}${top cpu 1}%
${top name 2} ${alignr}${top cpu 2}%

${font Cantarell:size=10}${color #bb99ff}RAM ${alignr}${color #ffffff}$memperc% ${color #666666}of ${color #ffffff}$memmax
${membar 6,270}

${font Cantarell:size=10}${color #bb99ff}DISK ${alignr}${color #ffffff}${fs_used_perc /}% ${color #666666}of ${color #ffffff}${fs_size /}
${fs_bar 6,270 /}

${font Cantarell:size=10}${color #bb99ff}NET ${alignr}${color #888888}↓ ${color #ffffff}${downspeed wlan0} ${color #888888}↑ ${color #ffffff}${upspeed wlan0}
${downspeedgraph wlan0 24,130 666666 bb99ff} ${upspeedgraph wlan0 24,130 666666 bb99ff}

${color #888888}${alignc}${hr 2}
${color #666666}${alignc}${font Cantarell:size=8}glassmorphism at its finest${font}
]];
