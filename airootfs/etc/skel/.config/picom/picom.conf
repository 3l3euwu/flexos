# FlexOS Picom Config - XFCE Glassmorphism Compositor

backend = "glx";
vsync = true;

# Flou glassmorphism principal
blur-background = true;
blur-background-frame = true;
blur-background-fixed = true;
blur-kern = "3x3box";
blur-strength = 7;

# Ombres portées style verre
shadow = true;
shadow-radius = 15;
shadow-offset-x = -6;
shadow-offset-y = -6;
shadow-opacity = 0.40;
shadow-color = "#0a0a1a";
shadow-exclude = [
  "class_g = 'Conky'",
  "class_g = 'xfce4-panel'"
];

# Transparence active/inactive
inactive-opacity = 0.88;
active-opacity = 1.0;
frame-opacity = 0.82;
inactive-opacity-override = false;

# Règles d'opacité par application
opacity-rule = [
  "92:class_g = 'Conky'",
  "85:class_g = 'xfce4-panel'",
  "80:class_g = 'Rofi'",
  "88:class_g = 'Alacritty'",
  "75:class_g = 'Dunst'",
  "95:class_g = 'Thunar'"
];

# Coins arrondis (glassmorphism)
corner-radius = 14;
rounded-corners-exclude = [
  "class_g = 'Conky'",
  "class_g = 'xfce4-panel'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

# Exclure du flou
blur-background-exclude = [
  "class_g = 'Conky'",
  "class_g = 'xfce4-panel'",
  "_NET_WM_STATE@:32a *= '_NET_WM_STATE_FULLSCREEN'"
];

# Transparence des menus
menu-opacity = 0.92;

# Animations
fading = true;
fade-delta = 4;
fade-in-step = 0.03;
fade-out-step = 0.03;

# Performances
detect-rounded-corners = true;
detect-client-opacity = true;
use-damage = false;
xrender-sync = true;
unredir-if-possible = true;
