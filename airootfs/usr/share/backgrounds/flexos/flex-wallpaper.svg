<svg xmlns="http://www.w3.org/2000/svg" width="3840" height="2160" viewBox="0 0 3840 2160">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#1a0a2e"/>
      <stop offset="50%" stop-color="#2d1b4e"/>
      <stop offset="100%" stop-color="#0f0a2a"/>
    </linearGradient>
    <radialGradient id="o1" cx="20%" cy="30%" r="40%">
      <stop offset="0%" stop-color="#7c4dff" stop-opacity=".30"/>
      <stop offset="60%" stop-color="#7c4dff" stop-opacity=".08"/>
      <stop offset="100%" stop-color="#7c4dff" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o2" cx="80%" cy="70%" r="45%">
      <stop offset="0%" stop-color="#00bcd4" stop-opacity=".25"/>
      <stop offset="60%" stop-color="#00bcd4" stop-opacity=".06"/>
      <stop offset="100%" stop-color="#00bcd4" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o3" cx="50%" cy="20%" r="35%">
      <stop offset="0%" stop-color="#ff6ec7" stop-opacity=".20"/>
      <stop offset="50%" stop-color="#ff6ec7" stop-opacity=".05"/>
      <stop offset="100%" stop-color="#ff6ec7" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="o4" cx="65%" cy="25%" r="30%">
      <stop offset="0%" stop-color="#ffd740" stop-opacity=".15"/>
      <stop offset="60%" stop-color="#ffd740" stop-opacity=".04"/>
      <stop offset="100%" stop-color="#ffd740" stop-opacity="0"/>
    </radialGradient>
    <filter id="g"><feGaussianBlur stdDeviation="60"/></filter>
    <filter id="gl"><feGaussianBlur stdDeviation="30"/></filter>
    <pattern id="grid" width="80" height="80" patternUnits="userSpaceOnUse">
      <path d="M80 0 0 0 0 80" fill="none" stroke="rgba(255,255,255,.02)" stroke-width="1"/>
    </pattern>
    <radialGradient id="vig" cx="50%" cy="50%" r="70%">
      <stop offset="60%" stop-color="#000" stop-opacity="0"/>
      <stop offset="100%" stop-color="#000" stop-opacity=".4"/>
    </radialGradient>
  </defs>
  <rect width="3840" height="2160" fill="url(#bg)"/>
  <rect width="3840" height="2160" fill="url(#grid)"/>
  <ellipse cx="700" cy="600" rx="800" ry="700" fill="url(#o1)" filter="url(#g)"/>
  <ellipse cx="3000" cy="1500" rx="900" ry="800" fill="url(#o2)" filter="url(#g)"/>
  <ellipse cx="1800" cy="400" rx="600" ry="500" fill="url(#o3)" filter="url(#g)"/>
  <ellipse cx="2500" cy="500" rx="500" ry="400" fill="url(#o4)" filter="url(#gl)"/>
  <circle cx="1200" cy="1500" r="200" fill="rgba(124,77,255,.08)" stroke="rgba(255,255,255,.12)" stroke-width="2" filter="url(#gl)"/>
  <circle cx="2800" cy="600" r="150" fill="rgba(0,188,212,.08)" stroke="rgba(255,255,255,.1)" stroke-width="2" filter="url(#gl)"/>
  <rect x="1600" y="1400" width="300" height="300" rx="60" fill="rgba(255,110,199,.06)" stroke="rgba(255,255,255,.08)" stroke-width="2" filter="url(#gl)" transform="rotate(25 1750 1550)"/>
  <rect width="3840" height="2160" fill="url(#vig)"/>
</svg>
