DEFAULT flexos
PROMPT 0
TIMEOUT 150

UI vesamenu.c32
MENU TITLE FlexOS Linux
MENU BACKGROUND /arch/boot/syslinux/splash.png
MENU COLOR border 30;44 #ffffffff #00000000 none
MENU COLOR title 1;36;44 #ffffffff #00000000 none
MENU COLOR sel 7;37;44 #ff7c4dff #00000000 none
MENU COLOR unsel 37;44 #ffffffff #00000000 none
MENU COLOR hotkey 1;37;44 #ffffffff #00000000 none

LABEL flexos
  LINUX ../vmlinuz-linux
  INITRD ../initramfs-linux.img
  APPEND archisobasedir=arch archiso_checksum archisosearch=FlexOS root=/dev/disk/by-label/FLEXOS_* rw quiet splash

LABEL flexos-nomodeset
  LINUX ../vmlinuz-linux
  INITRD ../initramfs-linux.img
  APPEND archisobasedir=arch archiso_checksum archisosearch=FlexOS root=/dev/disk/by-label/FLEXOS_* rw nomodeset

LABEL flexos-nouveau
  LINUX ../vmlinuz-linux
  INITRD ../initramfs-linux.img
  APPEND archisobasedir=arch archiso_checksum archisosearch=FlexOS root=/dev/disk/by-label/FLEXOS_* rw nouveau.modeset=0

LABEL hdt
  COM32 hdt.c32

LABEL reboot
  COM32 reboot.c32

LABEL poweroff
  COM32 poweroff.c32
